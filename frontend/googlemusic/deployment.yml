apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 730335281328.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:687d7f1d61adb4221bc75974452897b4b33d9882
        ports:
        - containerPort: 80
