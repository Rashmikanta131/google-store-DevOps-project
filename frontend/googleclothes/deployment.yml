apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 730335281328.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:687d7f1d61adb4221bc75974452897b4b33d9882
        ports:
        - containerPort: 80
