apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 730335281328.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:687d7f1d61adb4221bc75974452897b4b33d9882
        ports:
        - containerPort: 80
