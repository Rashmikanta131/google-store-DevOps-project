apiVersion: apps/v1
kind: Deployment
metadata:
  name: phones-deployment
  labels:
    app: phones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 730335281328.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:687d7f1d61adb4221bc75974452897b4b33d9882
        ports:
        - containerPort: 80
